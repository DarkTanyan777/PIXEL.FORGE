<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - SYSTEM FAILURE</title>
  
  <!-- Подключаем те же шрифты и стили -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* Специфичные стили только для 404 */
    .error-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Огромная цифра 404 с глитчем */
    .glitch-number {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(80px, 20vw, 200px);
      color: var(--cyan);
      position: relative;
      margin-bottom: 20px;
      text-shadow: 0 0 20px var(--cyan);
    }

    .glitch-number::before,
    .glitch-number::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .glitch-number::before {
      color: var(--pink);
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(-0.025em, -0.0125em);
      opacity: 0.75;
    }

    .glitch-number::after {
      color: var(--yellow);
      animation: glitch-anim-2 2s infinite linear alternate-reverse;
      clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
      transform: translate(0.0125em, 0.025em);
      opacity: 0.75;
    }

    /* Анимации глитча */
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 80% 0); }
      20% { clip-path: inset(60% 0 10% 0); }
      40% { clip-path: inset(40% 0 50% 0); }
      60% { clip-path: inset(80% 0 5% 0); }
      80% { clip-path: inset(10% 0 60% 0); }
      100% { clip-path: inset(30% 0 30% 0); }
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); }
      20% { clip-path: inset(80% 0 5% 0); }
      40% { clip-path: inset(30% 0 20% 0); }
      60% { clip-path: inset(10% 0 80% 0); }
      80% { clip-path: inset(50% 0 30% 0); }
      100% { clip-path: inset(70% 0 10% 0); }
    }

    .error-message {
      font-size: 18px;
      margin-bottom: 40px;
      color: var(--text-secondary);
      max-width: 600px;
      line-height: 1.8;
    }

    .error-code {
      font-size: 10px;
      color: var(--pink);
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    /* Кнопки навигации */
    .error-nav {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Эффект мерцания текста */
    .blink {
      animation: blinker 1s linear infinite;
    }

    @keyframes blinker {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Сканлайны (как на всем сайте) -->
  <div class="scanlines"></div>
  <div class="grid-overlay"></div>

  <div class="error-container">
    <p class="error-code blink">CRITICAL ERROR // SECTOR 404</p>
    
    <!-- Глитч цифра -->
    <h1 class="glitch-number" data-text="404">404</h1>
    
    <div class="error-message">
      <p>> СТРАНИЦА НЕ НАЙДЕНА В БАЗЕ ДАННЫХ.</p>
      <p>> ВОЗМОЖНО, ОНА БЫЛА УДАЛЕНА ИЛИ ПЕРЕМЕЩЕНА В ДРУГОЕ ИЗМЕРЕНИЕ.</p>
      <p>> ПОПРОБУЙТЕ ВЕРНУТЬСЯ НА ГЛАВНУЮ.</p>
    </div>

    <div class="error-nav">
      <a href="index.html" class="btn btn-pixel btn-cyan">
        <span class="pixel-text">НА ГЛАВНУЮ</span>
      </a>
      <a href="services.html" class="btn btn-pixel btn-pink">
        <span class="pixel-text">УСЛУГИ</span>
      </a>
    </div>
  </div>
  <div class="custom-cursor cursor-dot"></div>
  <div class="custom-cursor cursor-ring"></div>
  <script src="js/cursor.js"></script>
</body>
</html>
